<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#1565c0">
  <title>{% block title %}Bharosa{% endblock %}</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="app-header">
    <div class="app-title">
      <span class="app-logo">💊</span>
      <span>Bharosa</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="warmup-btn" aria-label="Warm up demo" title="Pre-warm services + cache">🔥</button>
      <button class="icon-btn" id="demo-btn" aria-label="Demo mode" title="Toggle cached demo mode">🎬</button>
      <button class="icon-btn" id="text-size-btn" aria-label="Text size" title="Text size">Aa</button>
      <select class="icon-btn lang-select" id="lang-select" aria-label="Language" title="Language">
        <option value="en">EN</option>
        <option value="hi">हिं</option>
        <option value="ml">മല</option>
      </select>
    </div>
  </header>

  <main class="app-main">
    {% block content %}{% endblock %}
  </main>

  <nav class="bottom-nav" aria-label="Primary">
    <a href="/"          class="nav-item {% if active == 'home' %}active{% endif %}"    aria-label="Home">
      <span class="nav-icon">🏠</span><span class="nav-label">घर</span>
    </a>
    <a href="/scan"      class="nav-item {% if active == 'scan' %}active{% endif %}"    aria-label="Scan">
      <span class="nav-icon">📷</span><span class="nav-label">स्कैन</span>
    </a>
    <a href="/timetable" class="nav-item {% if active == 'timetable' %}active{% endif %}" aria-label="My medicines">
      <span class="nav-icon">📋</span><span class="nav-label">दवाइयाँ</span>
    </a>
    <a href="/checkin"   class="nav-item {% if active == 'checkin' %}active{% endif %}" aria-label="Check-in">
      <span class="nav-icon">💬</span><span class="nav-label">जाँच</span>
    </a>
    <a href="/sos"       class="nav-item sos {% if active == 'sos' %}active{% endif %}" aria-label="SOS">
      <span class="nav-icon">🚨</span><span class="nav-label">SOS</span>
    </a>
  </nav>

  <!-- fallbacks.js MUST load before app.js so the fetch wrapper is in place -->
  <script src="/static/fallbacks.js"></script>
  <script src="/static/i18n.js"></script>
  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
